# ============================================================================
# CI Workflow: api-service
# Trigger: Push or PR to main, when api-service files change
# ============================================================================

name: CI - API Service

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "apps/api-service/**"
      - ".github/workflows/ci-api-service.yml"
      - ".github/workflows/build-and-push.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "apps/api-service/**"
      - ".github/workflows/ci-api-service.yml"

env:
  SERVICE_NAME: api-service
  AWS_REGION: ap-northeast-2

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # main 브랜치 push 시에만 ECR push (PR은 빌드만)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "ecr-repo=agent-t-prod/api-service" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
            echo "ecr-repo=agent-t-dev/api-service" >> $GITHUB_OUTPUT
          fi

      - name: Call reusable workflow
        uses: ./.github/workflows/build-and-push.yml
        with:
          service-name: ${{ env.SERVICE_NAME }}
          dockerfile-path: apps/api-service/Dockerfile
          context-path: apps/api-service
          ecr-repository: ${{ steps.env.outputs.ecr-repo }}
          aws-region: ${{ env.AWS_REGION }}
          test-command: |
            # Python 테스트 예시
            pip install -r requirements.txt
            pip install pytest pytest-cov
            pytest tests/ --cov=app --cov-report=xml
          skip-tests: false
        secrets:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  # PR 빌드 검증 (ECR push 없이 빌드만)
  build-validation:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validation only)
        uses: docker/build-push-action@v5
        with:
          context: apps/api-service
          file: apps/api-service/Dockerfile
          push: false
          tags: ${{ env.SERVICE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests
        working-directory: apps/api-service
        run: |
          echo "Running tests..."
          # pip install -r requirements.txt
          # pytest tests/

