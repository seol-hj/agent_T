# ============================================================================
# Reusable Workflow: Docker Build & Push to ECR
# 여러 서비스에서 재사용 가능한 공통 빌드 workflow
# ============================================================================

name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: "Service name (e.g., api-service)"
      dockerfile-path:
        required: true
        type: string
        description: "Path to Dockerfile (e.g., apps/api-service/Dockerfile)"
      context-path:
        required: true
        type: string
        description: "Docker build context (e.g., apps/api-service)"
      ecr-repository:
        required: true
        type: string
        description: "ECR repository name (e.g., agent-t-dev/api-service)"
      aws-region:
        required: false
        type: string
        default: "ap-northeast-2"
      test-command:
        required: false
        type: string
        description: "Test command to run (optional)"
        default: ""
      skip-tests:
        required: false
        type: boolean
        default: false
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
    outputs:
      image-tag:
        description: "Docker image tag (git SHA)"
        value: ${{ jobs.build-and-push.outputs.image-tag }}
      image-uri:
        description: "Full Docker image URI"
        value: ${{ jobs.build-and-push.outputs.image-uri }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}
      image-uri: ${{ steps.meta.outputs.image-uri }}

    steps:
      # ===== Checkout ==========================================================
      - name: Checkout code
        uses: actions/checkout@v4

      # ===== Set up Docker Buildx =============================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ===== Configure AWS Credentials ========================================
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws-region }}

      # ===== Login to ECR ======================================================
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ===== Extract metadata ==================================================
      - name: Extract metadata
        id: meta
        run: |
          # Git SHA (short)
          IMAGE_TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

          # ECR registry
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          ECR_REPOSITORY="${{ inputs.ecr-repository }}"

          # Full image URI
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT

          echo "Image tag: $IMAGE_TAG"
          echo "Image URI: $IMAGE_URI"

      # ===== Run tests (optional) ==============================================
      - name: Run tests
        if: ${{ !inputs.skip-tests && inputs.test-command != '' }}
        working-directory: ${{ inputs.context-path }}
        run: |
          echo "Running tests for ${{ inputs.service-name }}..."
          ${{ inputs.test-command }}

      # ===== Build and push Docker image =======================================
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context-path }}
          file: ${{ inputs.dockerfile-path }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image-uri }}
            ${{ steps.login-ecr.outputs.registry }}/${{ inputs.ecr-repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # ===== Update Helm Chart Image Tag ======================================
      - name: Update Helm values image tag
        run: |
          SERVICE_NAME="${{ inputs.service-name }}"
          HELM_VALUES_PATH="infra/helm/services/${SERVICE_NAME}/values-dev.yaml"

          if [ -f "$HELM_VALUES_PATH" ]; then
            # yq 설치 (YAML 파서)
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq

            # 이미지 태그 업데이트
            yq eval ".image.tag = \"${{ steps.meta.outputs.image-tag }}\"" -i "$HELM_VALUES_PATH"

            echo "✅ Updated $HELM_VALUES_PATH"
            echo "New image tag: ${{ steps.meta.outputs.image-tag }}"
            cat "$HELM_VALUES_PATH"
          else
            echo "⚠️ Warning: $HELM_VALUES_PATH not found"
            exit 1
          fi

      # ===== Commit and Push Manifest Changes ==================================
      - name: Commit manifest changes
        run: |
          SERVICE_NAME="${{ inputs.service-name }}"
          HELM_VALUES_PATH="infra/helm/services/${SERVICE_NAME}/values-dev.yaml"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add "$HELM_VALUES_PATH"

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(helm): update ${{ inputs.service-name }} image to ${{ steps.meta.outputs.image-tag }}"
            git push
            echo "✅ Manifest updated and pushed"
          fi

      # ===== Summary ===========================================================
      - name: Summary
        run: |
          echo "### ✅ Build and Push Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** ${{ inputs.service-name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** ${{ steps.meta.outputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image URI:** ${{ steps.meta.outputs.image-uri }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔄 Argo CD will automatically sync the changes within 3 minutes." >> $GITHUB_STEP_SUMMARY
