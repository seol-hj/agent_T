# ============================================================================
# CI Workflow: analysis-service
# ============================================================================

name: CI - Analysis Service

permissions:
  contents: write  # Git push 권한 (build-and-push.yml 호출 시 필요)

on:
  push:
    branches: [main]
    paths:
      - "apps/analysis-service/**"
      - "libs/**"
      - ".github/workflows/ci-analysis-service.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/analysis-service/**"
      - "libs/**"

env:
  SERVICE_NAME: analysis-service
  AWS_REGION: ap-northeast-2

jobs:
  determine-env:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      ecr-repo: ${{ steps.env.outputs.ecr-repo }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ecr-repo=agent-t-dev/analysis-service" >> $GITHUB_OUTPUT
          else
            echo "ecr-repo=agent-t-dev/analysis-service" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: determine-env
    uses: ./.github/workflows/build-and-push.yml
    if: github.event_name == 'push'
    with:
      service-name: analysis-service
      dockerfile-path: apps/analysis-service/Dockerfile
      context-path: .  # 루트 context (libs/ 접근 필요)
      ecr-repository: ${{ needs.determine-env.outputs.ecr-repo }}
      test-command: |
        pip install -r requirements.txt
        echo "Tests skipped - TODO: implement tests"
      skip-tests: true  # TODO: 테스트 코드 구현 후 false로 변경
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  build-validation:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/analysis-service/Dockerfile
          push: false
          tags: analysis-service:${{ github.sha }}
