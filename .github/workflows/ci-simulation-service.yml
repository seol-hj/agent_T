# ============================================================================
# CI Workflow: simulation-service
# ============================================================================

name: CI - Simulation Service

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/simulation-service/**"
      - ".github/workflows/ci-simulation-service.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/simulation-service/**"

env:
  SERVICE_NAME: simulation-service
  AWS_REGION: ap-northeast-2

jobs:
  determine-env:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      ecr-repo: ${{ steps.env.outputs.ecr-repo }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ecr-repo=agent-t-prod/simulation-service" >> $GITHUB_OUTPUT
          else
            echo "ecr-repo=agent-t-dev/simulation-service" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: determine-env
    uses: ./.github/workflows/build-and-push.yml
    if: github.event_name == 'push'
    with:
      service-name: simulation-service
      dockerfile-path: apps/simulation-service/Dockerfile
      context-path: apps/simulation-service
      ecr-repository: ${{ needs.determine-env.outputs.ecr-repo }}
      test-command: |
        pip install -r requirements.txt
        pytest tests/
      skip-tests: false
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  build-validation:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: apps/simulation-service
          file: apps/simulation-service/Dockerfile
          push: false
          tags: simulation-service:${{ github.sha }}
