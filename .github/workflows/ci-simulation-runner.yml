# ============================================================================
# CI Workflow: simulation-runner
# SUMO 시뮬레이션 실행용 컨테이너 (별도 이미지)
# ============================================================================

name: CI - Simulation Runner

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/simulation-runner/**"
      - ".github/workflows/ci-simulation-runner.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/simulation-runner/**"

env:
  SERVICE_NAME: simulation-runner
  AWS_REGION: ap-northeast-2

jobs:
  determine-env:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      ecr-repo: ${{ steps.env.outputs.ecr-repo }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ecr-repo=agent-t-prod/simulation-runner" >> $GITHUB_OUTPUT
          else
            echo "ecr-repo=agent-t-dev/simulation-runner" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: determine-env
    uses: ./.github/workflows/build-and-push.yml
    if: github.event_name == 'push'
    with:
      service-name: simulation-runner
      dockerfile-path: apps/simulation-runner/Dockerfile
      context-path: apps/simulation-runner
      ecr-repository: ${{ needs.determine-env.outputs.ecr-repo }}
      test-command: |
        pip install -r requirements.txt
        pytest tests/
      skip-tests: false
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  build-validation:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: apps/simulation-runner
          file: apps/simulation-runner/Dockerfile
          push: false
          tags: simulation-runner:${{ github.sha }}
