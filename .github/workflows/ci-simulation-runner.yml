# ============================================================================
# CI Workflow: simulation-runner
# SUMO 시뮬레이션 실행용 컨테이너 (별도 이미지)
# ============================================================================

name: CI - Simulation Runner

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/simulation-runner/**"
      - ".github/workflows/ci-simulation-runner.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/simulation-runner/**"

env:
  SERVICE_NAME: simulation-runner
  AWS_REGION: ap-northeast-2

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ecr-repo=agent-t-prod/simulation-runner" >> $GITHUB_OUTPUT
          else
            echo "ecr-repo=agent-t-dev/simulation-runner" >> $GITHUB_OUTPUT
          fi

      - uses: ./.github/workflows/build-and-push.yml
        with:
          service-name: ${{ env.SERVICE_NAME }}
          dockerfile-path: apps/simulation-runner/Dockerfile
          context-path: apps/simulation-runner
          ecr-repository: ${{ steps.env.outputs.ecr-repo }}
          # SUMO 테스트는 skip (이미지 크기가 크고 테스트 환경 복잡)
          skip-tests: true
        secrets:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  build-validation:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: apps/simulation-runner
          file: apps/simulation-runner/Dockerfile
          push: false
          tags: ${{ env.SERVICE_NAME }}:${{ github.sha }}
