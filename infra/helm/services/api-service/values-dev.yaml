# ============================================================================
# API Service - Dev Environment Override
# ============================================================================

replicaCount: 1

image:
  repository: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/agent-t-dev/api-service
  tag: "sha-a1b2c3d"  # CI에서 자동 업데이트

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/agent-t-dev-api-service-irsa"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: false

config:
  LOG_LEVEL: "debug"
  DB_HOST: "agent-t-dev-postgres.xxxx.ap-northeast-2.rds.amazonaws.com"
  REDIS_HOST: "agent-t-dev-redis.xxxx.cache.amazonaws.com"
  S3_BUCKET_RAG_SOURCE: "agent-t-dev-rag-source"
  S3_BUCKET_ARTIFACT: "agent-t-dev-artifact"
  S3_BUCKET_REPORTS: "agent-t-dev-reports"

secrets:
  dbSecretArn: "arn:aws:secretsmanager:ap-northeast-2:123456789012:secret:agent-t-dev-db-credentials"
  redisSecretArn: "arn:aws:secretsmanager:ap-northeast-2:123456789012:secret:agent-t-dev-redis-auth"
  appSecretArn: "arn:aws:secretsmanager:ap-northeast-2:123456789012:secret:agent-t-dev-app-secrets"
