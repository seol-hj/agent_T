# ============================================================================
# API Service - Dev Environment Override
# ============================================================================

replicaCount: 1
image:
  repository: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/agent-t-dev/report-service
  tag: "sha-a1b470b" # CI에서 자동 업데이트
serviceAccount:
