  LLM_PROVIDER: "bedrock"
  LLM_MODEL_ID: "anthropic.claude-3-5-sonnet-20241022-v2:0"
  STORAGE_PROVIDER: "s3"
  PORT: "8007"
secrets:
  dbSecretArn: "arn:aws:secretsmanager:ap-northeast-2:123456789012:secret:agent-t-dev-db-credentials"
  redisSecretArn: "arn:aws:secretsmanager:ap-northeast-2:123456789012:secret:agent-t-dev-redis-auth"
  appSecretArn: "arn:aws:secretsmanager:ap-northeast-2:123456789012:secret:agent-t-dev-app-secrets"
