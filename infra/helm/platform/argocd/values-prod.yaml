# ============================================================================
# Argo CD - Prod Environment
# Helm Chart: https://github.com/argoproj/argo-helm/tree/main/charts/argo-cd
# ============================================================================

global:
  domain: argocd.prod.agent-t.com  # 실제 도메인으로 교체

# Argo CD Server
server:
  replicas: 2  # 고가용성

  # Ingress 설정 (ALB)
  ingress:
    enabled: true
    ingressClassName: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
      alb.ingress.kubernetes.io/healthcheck-path: /healthz
      alb.ingress.kubernetes.io/backend-protocol: HTTP
      alb.ingress.kubernetes.io/tags: Environment=prod,ManagedBy=argocd,Tier=production
      # HTTPS 설정 (Certificate Manager ARN으로 교체)
      alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:123456789012:certificate/REPLACE_ME
      # WAF 연결 (선택사항)
      # alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:...
      # IP 화이트리스트 (회사 IP로 제한)
      # alb.ingress.kubernetes.io/inbound-cidrs: 1.2.3.4/32,5.6.7.8/32
    hosts:
      - argocd.prod.agent-t.com
    paths:
      - /
    pathType: Prefix
    tls:
      - secretName: argocd-server-tls
        hosts:
          - argocd.prod.agent-t.com

  # 리소스 제한 (prod: 더 큰 리소스)
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi

  # Service 설정
  service:
    type: ClusterIP

  # Metrics
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s

  # Pod Anti-Affinity
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: argocd-server
        topologyKey: kubernetes.io/hostname

# Argo CD Repo Server
repoServer:
  replicas: 2  # 고가용성

  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: argocd-repo-server
        topologyKey: kubernetes.io/hostname

# Argo CD Application Controller
controller:
  replicas: 2  # 고가용성

  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: argocd-application-controller
        topologyKey: kubernetes.io/hostname

# Redis (Argo CD 내장, HA 모드)
redis:
  enabled: true

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

# Redis HA (선택사항, 매우 높은 가용성 필요 시)
redis-ha:
  enabled: false

# Dex (SSO, 사용 안 함 - 필요 시 활성화)
dex:
  enabled: false

# Notifications (Slack/Email 알림)
notifications:
  enabled: true

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # Notification 설정 (Slack 예시)
  notifiers:
    service.slack: |
      token: $slack-token
    # Email 예시
    # service.email.gmail: |
    #   username: $email-username
    #   password: $email-password
    #   host: smtp.gmail.com
    #   port: 587
    #   from: $email-username

  # Trigger 설정
  triggers:
    trigger.on-deployed: |
      - when: app.status.operationState.phase in ['Succeeded']
        send: [app-deployed]
    trigger.on-sync-failed: |
      - when: app.status.operationState.phase in ['Error', 'Failed']
        send: [app-sync-failed]

  # Template 설정
  templates:
    template.app-deployed: |
      message: Application {{.app.metadata.name}} has been deployed.
      slack:
        attachments: |
          [{
            "title": "{{.app.metadata.name}}",
            "color": "good",
            "fields": [{
              "title": "Sync Status",
              "value": "{{.app.status.sync.status}}",
              "short": true
            }]
          }]
    template.app-sync-failed: |
      message: Application {{.app.metadata.name}} sync failed.
      slack:
        attachments: |
          [{
            "title": "{{.app.metadata.name}}",
            "color": "danger",
            "fields": [{
              "title": "Sync Status",
              "value": "{{.app.status.sync.status}}",
              "short": true
            }]
          }]

  # Secret (Slack token 등)
  secret:
    create: true
    items:
      slack-token: ""  # Slack Bot Token

# ApplicationSet Controller
applicationSet:
  enabled: true

  replicas: 2

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

# ConfigMap 설정
configs:
  cm:
    # Git repository 설정 (infra/argocd/)
    repositories: |
      - type: git
        url: https://github.com/YOUR_ORG/agent-t.git
        # Private repo인 경우 credentials 설정 필요

    # Application 자동 동기화 설정
    application.instanceLabelKey: argocd.argoproj.io/instance

    # Timeout 설정
    timeout.reconciliation: 180s

    # Resource tracking
    application.resourceTrackingMethod: annotation

    # Status badge
    statusbadge.enabled: "true"

  # RBAC 설정
  rbac:
    policy.default: role:readonly
    policy.csv: |
      p, role:admin, applications, *, */*, allow
      p, role:admin, clusters, *, *, allow
      p, role:admin, repositories, *, *, allow
      p, role:admin, projects, *, *, allow
      p, role:deployer, applications, sync, */*, allow
      p, role:deployer, applications, get, */*, allow
      g, admin, role:admin
      g, deployer, role:deployer

  # Secret (admin 초기 비밀번호)
  secret:
    createSecret: true
    # admin password는 Secrets Manager에서 가져와 수동 설정
    # argocdServerAdminPassword: ""
    # GitHub Webhook secret
    # githubSecret: ""

# Node Selector
nodeSelector:
  workload: general

# Tolerations
tolerations: []

# Priority Class
priorityClassName: system-cluster-critical

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1
