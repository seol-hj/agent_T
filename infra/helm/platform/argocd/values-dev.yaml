# ============================================================================
# Argo CD - Dev Environment
# Helm Chart: https://github.com/argoproj/argo-helm/tree/main/charts/argo-cd
# ============================================================================

global:
  domain: argocd.dev.agent-t.local  # 실제 도메인으로 교체

# Argo CD Server
server:
  replicas: 1

  # Ingress 설정 (ALB)
  ingress:
    enabled: true
    ingressClassName: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
      alb.ingress.kubernetes.io/ssl-redirect: '443'
      alb.ingress.kubernetes.io/healthcheck-path: /healthz
      alb.ingress.kubernetes.io/backend-protocol: HTTP
      alb.ingress.kubernetes.io/tags: Environment=dev,ManagedBy=argocd
      # HTTPS 설정 (Certificate Manager ARN으로 교체)
      # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:123456789012:certificate/...
    hosts:
      - argocd.dev.agent-t.local
    paths:
      - /
    pathType: Prefix
    tls: []

  # 리소스 제한
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  # Service 설정
  service:
    type: ClusterIP

  # Metrics
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false

# Argo CD Repo Server
repoServer:
  replicas: 1

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  metrics:
    enabled: true
    serviceMonitor:
      enabled: false

# Argo CD Application Controller
controller:
  replicas: 1

  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi

  metrics:
    enabled: true
    serviceMonitor:
      enabled: false

# Redis (Argo CD 내장)
redis:
  enabled: true

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Dex (SSO, 사용 안 함)
dex:
  enabled: false

# Notifications
notifications:
  enabled: false

# ApplicationSet Controller
applicationSet:
  enabled: true

  replicas: 1

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# ConfigMap 설정
configs:
  cm:
    # Git repository 설정 (infra/argocd/)
    repositories: |
      - type: git
        url: https://github.com/YOUR_ORG/agent-t.git
        # Private repo인 경우 credentials 설정 필요
        # passwordSecret:
        #   name: git-creds
        #   key: password
        # usernameSecret:
        #   name: git-creds
        #   key: username

    # Application 자동 동기화 설정
    application.instanceLabelKey: argocd.argoproj.io/instance

    # Timeout 설정
    timeout.reconciliation: 180s

    # Resource tracking
    application.resourceTrackingMethod: annotation

  # RBAC 설정
  rbac:
    policy.default: role:readonly
    policy.csv: |
      p, role:admin, applications, *, */*, allow
      p, role:admin, clusters, *, *, allow
      p, role:admin, repositories, *, *, allow
      p, role:admin, projects, *, *, allow
      g, admin, role:admin

  # Secret (admin 초기 비밀번호는 자동 생성)
  secret:
    createSecret: true
    # admin password는 bcrypt hash로 설정
    # argocdServerAdminPassword: ""
    # GitHub Webhook secret
    # githubSecret: ""

# Node Selector
nodeSelector:
  workload: general

# Tolerations
tolerations: []

# Priority Class
priorityClassName: ""
