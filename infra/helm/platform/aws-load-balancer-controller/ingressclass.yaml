# ============================================================================
# IngressClass ВаЋВЮў
# AWS Load Balancer ControllerЖ░ђ В▓ўвдгьЋа Ingress class
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: alb
  annotations:
    ingressclass.kubernetes.io/is-default-class: "true"
spec:
  controller: ingress.k8s.aws/alb
  parameters:
    apiGroup: elbv2.k8s.aws
    kind: IngressClassParams
    name: alb

---
# ============================================================================
# IngressClassParams
# ALB ЖИ░в│И ВёцВаЋ (вфевЊа IngressВЌљ Ж│хьєх ВаЂВџЕ)
# ============================================================================
apiVersion: elbv2.k8s.aws/v1beta1
kind: IngressClassParams
metadata:
  name: alb
spec:
  # ALB Scheme (internet-facing / internal)
  scheme: internet-facing

  # IP Address Type (ipv4 / dualstack)
  ipAddressType: ipv4

  # ЖИ░в│И ьЃюЖиИ (вфевЊа ALBВЌљ ВъљвЈЎ ВХћЖ░ђ)
  tags:
    - key: ManagedBy
      value: aws-load-balancer-controller
    - key: Project
      value: agent-t

  # Load Balancer Attributes (ВёаьЃЮВѓгьЋГ)
  # loadBalancerAttributes:
  #   - key: idle_timeout.timeout_seconds
  #     value: "60"
  #   - key: deletion_protection.enabled
  #     value: "false"
