---
apiVersion: v1
kind: Service
metadata:
  name: pipeline
  namespace: agent-t
  labels:
    app: pipeline
    component: orchestration
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: pipeline

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline
  namespace: agent-t
  labels:
    app: pipeline
    component: orchestration
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pipeline
  template:
    metadata:
      labels:
        app: pipeline
        component: orchestration
    spec:
      serviceAccountName: agent-t-app
      containers:
        - name: pipeline
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/agent-t/pipeline:v0.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: ORCHESTRATOR_URL
              value: "http://orchestrator:8001"
            - name: SCENARIO_BUILDER_URL
              value: "http://scenario-builder:8002"
            - name: NETWORK_BUILDER_URL
              value: "http://network-builder:8003"
            - name: DEMAND_BUILDER_URL
              value: "http://demand-builder:8004"
            - name: SIMULATOR_RUNNER_URL
              value: "http://simulator-runner:8005"
            - name: ANALYZER_URL
              value: "http://analyzer:8006"
            - name: REPORTER_URL
              value: "http://reporter:8007"
            - name: PORT
              value: "8000"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pipeline
  namespace: agent-t
  labels:
    app: pipeline
    component: orchestration
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pipeline
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
