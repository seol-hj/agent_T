apiVersion: v1
kind: Service
metadata:
  name: scenario-builder
  namespace: agent-t
  labels:
    app: scenario-builder
spec:
  selector:
    app: scenario-builder
  ports:
    - name: http
      port: 8001
      targetPort: 8001
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scenario-builder
  namespace: agent-t
  labels:
    app: scenario-builder
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scenario-builder
  template:
    metadata:
      labels:
        app: scenario-builder
    spec:
      containers:
        - name: scenario-builder
          image: <AWS_ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/agent-t/scenario-builder:latest
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: PORT
              value: "8001"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scenario-builder
  namespace: agent-t
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /scenario-builder
            pathType: Prefix
            backend:
              service:
                name: scenario-builder
                port:
                  number: 8001
