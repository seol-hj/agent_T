---
# Simulator Runner Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simulator-runner
  namespace: agent-t
  labels:
    app: simulator-runner
    component: runner
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simulator-runner
  template:
    metadata:
      labels:
        app: simulator-runner
        component: runner
    spec:
      serviceAccountName: agent-t-app
      containers:
      - name: simulator-runner
        image: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_REGION>.amazonaws.com/agent-t/simulator-runner:v0.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8004
          protocol: TCP
        env:
        - name: STORAGE_PROVIDER
          value: "s3"
        - name: STORAGE_BASE_PATH
          value: "agent-t-simulations"
        - name: STORAGE_GATEWAY_URL
          value: "http://storage-gateway:9002"
        - name: AWS_REGION
          value: "ap-northeast-2"
        - name: SUMO_EXECUTOR_TYPE
          value: "kubernetes"  # dry_run, local, kubernetes
        - name: PORT
          value: "8004"
        # Kubernetes Job Executor 설정
        - name: K8S_NAMESPACE
          value: "agent-t"
        - name: K8S_JOB_IMAGE
          value: "<AWS_ACCOUNT_ID>.dkr.ecr.<AWS_REGION>.amazonaws.com/simulation-runner:v1.0"
        - name: K8S_IMAGE_PULL_POLICY
          value: "Always"
        - name: K8S_JOB_TIMEOUT
          value: "600"
        - name: K8S_POLL_INTERVAL
          value: "5"
        - name: K8S_IN_CLUSTER
          value: "true"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 1Gi

---
# Simulator Runner Service
apiVersion: v1
kind: Service
metadata:
  name: simulator-runner
  namespace: agent-t
  labels:
    app: simulator-runner
    component: runner
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8004
    targetPort: http
    protocol: TCP
  selector:
    app: simulator-runner

---
# Simulator Runner HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: simulator-runner
  namespace: agent-t
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: simulator-runner
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
