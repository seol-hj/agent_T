---
# Reporter Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporter
  namespace: agent-t
  labels:
    app: reporter
    component: reporting
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reporter
  template:
    metadata:
      labels:
        app: reporter
        component: reporting
    spec:
      serviceAccountName: agent-t-sa
      containers:
      - name: reporter
        image: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_REGION>.amazonaws.com/agent-t/reporter:v0.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8006
          protocol: TCP
        env:
        - name: STORAGE_PROVIDER
          value: "s3"
        - name: STORAGE_BASE_PATH
          value: "agent-t-reports"
        - name: LLM_PROVIDER
          value: "bedrock"
        - name: AWS_REGION
          value: "ap-northeast-2"
        - name: PORT
          value: "8006"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}

---
# Reporter Service
apiVersion: v1
kind: Service
metadata:
  name: reporter
  namespace: agent-t
  labels:
    app: reporter
    component: reporting
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8006
    targetPort: http
    protocol: TCP
  selector:
    app: reporter

---
# Reporter HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: reporter
  namespace: agent-t
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: reporter
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
